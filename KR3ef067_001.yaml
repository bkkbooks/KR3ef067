body:
  text: 卷一傷寒一證仲景論中立三百九十七法一百一十三方神明變化可謂既詳且盡矣其治雜證也則有金匱要略分門別類包舉該括無非示人以規矩準繩欲其觸類傍通以應變於無窮也但其辭旨古奧義蘊幽深條目繁多未易領會人多苦之茲特撮其要旨編為歌訣俾學者便於熟讀默記融會貫通然後再玩味全書則易讀易解有會心之樂而無望洋之嘆矣由此登堂入室將見二千年來大法微言昭如日月不致塵封庶幾於斯道不無小補云爾傷寒傳經從陽化熱從陰化寒原委六經為病盡傷寒氣同病異豈期然推其形臟原非一因從類化故多端明諸水火相勝義化寒變熱理何難漫言變化千般狀不外陰陽表裡間注六經謂太陽陽明少陽太陰少陰厥陰也為病盡傷寒謂六經為病盡傷寒之變化也氣同為天之六氣感人為病同也病異謂人受六氣生病異也豈期然謂不能預先期其必然之寒熱也推其形臟原非一謂推原其人形之厚薄臟之虛實非一也因從類化故多端謂人感受邪氣雖一因其形臟不同或從寒化或從熱化或從虛化或從實化故多端不齊也明諸水火相勝義謂水勝則火滅火勝則水乾也化寒變熱理何難謂邪至其經或從陰化為寒或從陽變為熱即水火相勝從化之理何難明也漫言變化千般狀二句謂傷寒變化千般總不外乎陰陽表裡間也太陽風邪傷衛脈證中風傷衛脈浮緩頭項強痛惡寒風病即發熱汗自出鼻鳴乾嘔桂枝功注中風病名也傷衛謂風傷衛也脈浮緩謂中風脈也頭痛項強惡寒惡風發熱汗自出鼻鳴乾嘔謂中風證也桂枝功謂桂枝湯功能治中風虛邪也詳太陽上篇太陽寒邪傷營脈證傷寒傷營脈浮緊頭疼身痛惡寒風無汗而喘已未熱嘔逆麻黃湯發靈注傷寒病名也傷營謂寒傷營也脈浮緊謂傷寒脈也頭疼身痛惡寒惡風無汗而喘或已發熱或未發熱嘔逆謂傷寒證也麻黃湯發謂傷寒實邪當與麻黃湯發汗最靈也詳太陽中篇風寒營衛同病脈證中風浮緊遍身痛頭疼發熱惡寒風千嘔無汗兼煩躁傷寒身重乍時輕浮緩嘔逆無汗喘頭疼發熱惡寒風煩躁而無少陰證營衛同病大青龍注中風謂風傷衛之病也頭疼發熱惡風惡寒乾嘔中風之證也浮緊寒傷營之脈也身疼痛寒傷營之證也今以中風之病而得傷寒之脈與證更兼不汗出之表實內熱之煩躁也傷寒謂寒傷營之病也身重不痛乍有輕時風傷衛之證也浮緩風傷衛之脈也嘔逆無汗而喘頭疼發熱惡寒惡風寒傷營之證也是以傷寒之病而得中風之脈與證更兼太陽無汗內熱之煩躁也而無少陰證謂無身重但欲寐之證也營衛同病謂風寒中傷營衛同病也二證皆無汗實邪故均以大青龍湯發之詳太陽下篇誤服三湯致變救逆傷寒酒病桂勿與嘔吐不已血膿鮮尺遲服麻致漏汗惡風肢急小便難微弱汗風青龍發厥惕悸眩熱仍然身瞤振振欲劈地桂加附子真武痊注傷寒謂傷寒無汗之實邪也酒病謂病酒狀似中風也桂勿與謂皆勿與桂枝湯也誤與傷寒則表氣愈固裡氣更逆嘔吐不已也誤與酒病則濕熱內釀傷營吐血膿也此皆誤用桂枝湯之變證當隨其變證治之可也尺遲謂傷寒尺中脈遲也服麻謂服麻黃湯發汗遂致汗出不止名曰漏汗也肢急四肢拘急也小便難謂小便少而難也傷寒脈證當用麻黃湯發汗若尺中脈遲是營氣不足不可發汗若誤發之則致漏汗惡風四肢拘急小便難等變證也當以桂枝加附子湯救逆可也微弱謂大青龍證脈微弱也汗風謂大青龍證自汗惡風也大青龍證脈不浮緊若浮緩而微弱反汗出是大青龍脈證未具也誤以大青龍發之致其人厥冷筋惕心悸頭眩熱仍不退身肉瞤動也振振欲劈地謂聳動不已不能興起欲墮於地也此皆誤與大青龍湯發汗之變證當以真武湯救逆可也詳太陽篇三陽受病傳經欲愈脈證傷寒一日太陽病欲吐煩躁數急傳陽明少陽證不見脈靜身和為不傳注傷寒一日太陽受病二日陽明受病三日少陽受病此其傳經之常也若初病頗欲吐煩躁脈數急者謂邪盛傳經而不解也二三日陽明少陽證不見脈靜身無所苦者謂邪衰不傳欲自愈矣陽明表病脈證葛根浮長表陽明緣緣面赤額頭疼發熱惡寒而無汗目痛鼻乾臥不寧注太陽未罷又傳陽明太陽表邪怫鬱陽明肌熱為陽明經表病也葛根表陽明謂葛根湯主治陽明表病也浮長謂陽明之表脈也緣緣面赤連額頭疼發熱惡寒無汗目痛鼻乾臥不得寧皆謂陽明經之表證也用葛根湯解兩經之邪也詳陽明篇陽明熱病脈證白虎煩渴熱陽明汗出身熱脈長洪不惡寒兮反惡熱合柴兼見少陽經注太陽已罷而傳陽明不傳少陽亦未入腑其熱漸深表裡俱熱為陽明經熱病也白虎熱陽明謂白虎湯主治陽明熱病也脈長洪謂陽明之熱脈也煩躁口渴引飲汗出身熱不惡寒反惡熱皆謂陽明經熱病之證也用白虎湯解陽明表裡俱熱也陽明未罷又傳少陽亦陽明熱病也合柴謂白虎合小柴胡湯治陽明經熱證兼見少陽經弦脈寒熱往來口苦耳聾目眩而嘔胸脅痛之病也詳陽明少陽篇陽明腑病脈證胃實脈大腑陽明大便難兮脾約同蒸蒸潮熱濈濈汗滿痛始可議三承注脈大腑陽明謂熱邪入腑陽明當脈大也曰胃實曰大便難曰脾約謂腑病受邪之不同也脾約者太陽陽明也胃實者正陽陽明也大便難者少陽陽明也皆為可下之證不無輕重之別然必蒸蒸潮熱身肢濈濈然汗出或滿或痛始可議其微甚以三承氣湯麻仁丸下之可也詳陽明篇陽明慎汗慎清慎下陽明表證反有汗桂枝加葛中風傳熱證無汗亡津液燥渴仍從白虎痊胃實汗熱原應下惡寒浮緩表為先欲知定硬識矢氣不轉微澀下之冤舌滑尿白小便數便硬休攻導自安小便數多知便硬無苦數少是津還注陽明表證應無汗反有汗是從風邪傳來仍從表治宜用栓枝加葛根湯陽明熱證應有汗反無汗是或吐或汗或下亡其津液若無燥渴則從表治若有燥渴仍從熱治宜用白虎湯胃實自汗潮熱原應下之若有惡寒浮緩之表宜先解表表解已乃可攻之欲知大便硬定未定當少與小承氣湯轉矢氣者已成定硬當與大承氣湯攻之若不轉矢氣者未成定硬攻之必溏勿更與也若脈微澀者亦不可下下之則冤死也舌滑尿白裡熱微也雖小便數大便硬其熱遠在廣腸亦不可下用蜜煎豬膽導法自可安也凡小便數多知大便必硬雖大便硬而無或滿或痛之苦當審其小便日幾行日減數少是津液還於胃中慎不可攻不久必自大便出也詳陽明篇少陽脈證往來寒熱胸脅滿脈弦目眩而耳聾口苦默默不欲食心煩喜嘔少陽經或渴或咳身微熱或脅硬痛腹中疼或悸不嘔尿不利舌苔滑白小柴宗注脈弦謂少陽病脈也往來寒熱胸脅滿目眩耳聾口苦默默不欲食心煩喜嘔少陽經主證也或渴或咳身微熱或脅硬痛腹中疼或悸不嘔尿不利舌苔滑白者皆少陽或有之證也均宜小柴胡湯主之隨證加減治之可也詳少陽篇少陽病用柴胡湯加減法胸煩不嘔去參夏加蔞若渴半易根腹痛去芩加芍藥心悸尿祕苓易芩脅下痞硬棗易蠣不渴微熱桂易參咳去參棗加干味小柴臨證要當斟注少陽經主證宜小柴胡湯主治也其或有之證務要臨證斟酌加減可也若胸中煩而不嘔去半夏人參加栝萎實若渴者以半夏易栝萎根若腹中痛去黃芩加白芍若心下悸小便不利者加茯苓去黃芩若脅下痞硬加牡蠣去大棗若不渴外有微熱者去人參加桂枝微汗之若咳者去人參大棗加乾薑五味子義詳少陽篇小柴胡湯下少陽禁汗禁吐禁下少陽三禁要詳明汗譫吐下悸而驚甚則吐下利不止水漿不入命難生注三禁謂少陽禁吐禁汗禁下也若誤發汗則生譫語若誤吐下則心悸而驚少陽經即有心下硬不可下下之甚則下利不止即有胸中滿不可吐吐之甚則水漿不入變成危候命難生也詳少陽篇少陽可吐可汗可下胸滿熱煩梔子豉痞硬衝喉瓜蒂平發熱惡寒肢煩痛微嘔支結柴桂寧鬱郁微煩嘔不止心下痛硬大柴攻誤下柴胡證仍在復與柴胡振汗生注上言其禁恐失宜也此言其可貴變通也胸滿煩熱太陽少陽輕邪也宜梔子豉湯湧之胸滿痞硬氣上衝喉不得息者太陽少陽重邪也宜瓜蒂散吐之發熱惡寒四肢煩疼微嘔心下支結太陽少陽表證也宜柴胡桂枝湯微汗兩解之鬱郁微煩嘔不止心下痛硬少陽陽明表裡證也宜大柴胡湯緩攻兩解之誤下不致變逆柴胡證仍在者復與柴胡湯以和解之若解則必蒸蒸振汗出而解以下後虛故也詳太陽少陽篇三陽合病並病合病兩三經同病並病傳歸併一經二陽合病滿喘發自利葛根嘔半同太少利芩嘔加半明少弦負順長生滑數宿食大承氣三陽合病腹膨膨口燥身重而譫語欲眠合目汗蒸蒸遺尿面垢參白虎浮大汗下禁當應二陽並病汗不徹面赤怫鬱大青龍表罷潮熱手足汗便難譫語大承攻太少頭項痛眩冒心下痞硬如結胸禁汗吐下惟宜刺譫驚不食利多凶注一經未罷又傳一經二經三經同病而不歸併一經者謂之合病二經三經同病而後歸併一經自病者謂之並病二陽謂太陽陽明也太陽則有頭痛發熱惡寒無汗陽明則有肌熱惡熱心煩不眠之證相合同病也滿喘謂二陽合病當下利不下利更加胸滿而喘宜麻黃湯發之自利謂二陽合病當有之證宜葛根湯也嘔半謂二陽合病不下利但加嘔者宜葛根湯加半夏也同謂二證同用葛根一方也太少謂太陽少陽合病也太陽則有頭痛發熱惡寒無汗少陽則有寒熱往來口苦耳聾目眩胸脅痛之證相合同病也利芩謂太陽少陽合病當自下利宜與黃芩湯也嘔加半謂太陽少陽合病不自利但加嘔者宜黃芩湯加半夏也若不嘔利而見太陽少陽之證非合病也宜用柴胡桂枝湯兩解之明少謂陽明少陽兩經之證同見下利合病也弦負弦為少陽木脈木勝則土負負則死也順長生長為陽明土脈土盛則木不能災為順順則生也滑數謂陽明少陽合病下利黏穢者脈必滑數是宿食也宜大承氣湯嘔酸苦者宜大柴胡湯三陽謂太陽陽明少陽合病也腹膨膨謂腹脹滿也口燥謂口中乾燥也身重謂身重難轉側也譫語謂妄亂言也欲眠謂喜睡也合目汗蒸蒸謂合目出熱汗也遺尿謂失尿不知也面垢謂面似有油垢也此皆三陽熱盛津液枯竭之證設使脈浮禁不可汗脈大亦不可下惟宜用白虎加人參益氣生津清熱可也若未經汗下津液未傷三陽合病輕證惟宜柴葛解肌湯清解三陽可也二陽謂太陽陽明並病也汗不徹謂邪在太陽發汗未徹又傳陽明也面赤謂邪猶怫鬱於太陽陽明之表未並陽明之腑宜大青龍湯解兩經之熱也表罷謂太陽證罷也潮熱手足汗大便難譫語謂已歸併陽明腑也宜大承氣湯攻陽明實熱也太少謂太陽少陽並病也頭項強痛目眩昏冒心下痞硬如結胸證謂太陽少陽二經之證尚未歸併其邪未定禁不可汗下惟宜刺大椎肝腧肺腧以瀉其熱也若誤發汗則必發譫語若誤吐下則必心煩而驚水漿不入下利不止變此惡候命多凶也義詳合病並病篇三陰受病傳經欲愈脈證傷寒三日三陽盡熱微煩躁入陰傳其人能食而不嘔脈小尿清為不傳注傷寒三日三陽受邪為盡三陰當受邪其人身熱雖微而煩躁者謂邪去陽入陰不解也若其人反能食而不嘔脈靜小小便清謂邪未入於陰為不傳欲自愈也太陰陰邪脈證太陰陰邪沉遲脈吐食腹滿有時疼手足自溫利不渴理中湯主悸加苓腹滿去朮加附子吐多去朮加薑生雖吐下多還用術渴欲得水倍術寧欲作奔豚術易桂乾薑寒倍參腹疼注太陰陰邪謂邪從陰化之寒證也脈沉遲太陰陰邪脈也吐食腹滿時痛太陰裡寒證也手足自溫邪入陰也自利不渴臟無熱也宜理中湯主之若心下悸加茯苓腹滿去朮加附子吐多去朮加生薑雖吐若下利多還用白朮若渴欲得飲水仍倍加朮若臍下欲作奔豚去朮易桂中寒倍加乾薑腹痛倍加人參詳太陰篇太陰陽邪脈證陽邪嗌乾腹滿痛誤下時痛大實疼大承桂枝加芍大脈弱芍大當審行注陽邪謂太陰邪從陽化之熱證也嗌乾謂咽乾太陰熱也腹滿痛太陰有餘證也誤下謂誤下邪陷太陰當分輕重也時痛謂腹有時痛有時不痛宜桂枝加芍藥湯和之大實痛謂腹大滿痛無時不痛宜桂枝加大黃湯下之兼陽明胃實以大承氣湯下之若脈弱即當行大黃芍藥宜斟酌減之以其人胃氣弱易動也詳太陰篇太陰陽明表裡同病腹滿時減復如故此是寒虛氣上從腹滿不減不大便轉屬陽明乃可攻注腹滿時減減復如故謂腹時滿時不滿而減復如常此為太陰寒邪寒虛之氣上逆之滿乃可溫之證也宜厚朴生薑甘草半夏人參湯腹滿不減謂常常而滿終日不減或不大便此為轉屬陽明實熱內壅之滿乃可攻之證也宜大承氣湯詳太陰篇少陰陰邪脈證少陰陰邪脈沉細背寒欲寐口中和咽痛腹痛骨節痛厥利清穀四逆瘥注少陰陰邪謂邪從陰化之寒證也脈沉細少陰陰邪之脈也背寒謂背惡寒陽氣虛也欲寐謂但欲寐陰氣盛也口中和口中不幹燥也咽痛腹痛下利清穀寒盛於中也骨節疼痛四肢厥冷寒淫於外也宜四逆湯溫中散寒也詳少陰篇少陰陽邪脈少陰陽邪沉細數口燥咽乾大承湯少陰心煩不得臥黃連阿膠是主方注陽邪謂少陰邪從陽化之熱證也少陰病但欲寐陰邪則脈沉細無力陽邪則脈加數而有力矣始病即口燥咽乾水不上升熱之甚也宜大承氣湯急下之瀉陽救陰也少陰病但欲寐二三日以上變生心煩不得眠是陽邪乘陰陰不能靜也宜黃連阿膠湯清陽益陰也詳少陰篇少陰太陽表裡同病少陰脈沉反發熱麻黃附子細辛湯若二三日無里證減辛加草用之良注少陰病脈沉為陰寒之證當無熱今反發熱是兼有太陽表也宜麻黃附子細辛湯急溫而散之若二三日熱仍不解亦無裡寒吐利之證去細辛易甘草緩溫而和之詳少陰篇厥陰陰邪脈證厥陰陰邪微細厥膚冷臟厥躁難安囊縮舌短苔滑黑四逆當歸四逆先少滿痛厥薑萸入蛔厥靜而復時煩得食而嘔蛔聞臭煩因蛔動烏梅丸注厥陰陰邪謂邪從陰化之寒證也微細厥陰陰邪脈也厥謂四肢厥冷也膚冷謂肌膚冷也臟厥謂寒陰臟厥也躁難安謂煩躁無有安時也囊縮謂外腎為寒收引縮入腹也婦人則乳縮陰收也舌短謂舌縮短也苔滑黑謂舌苔不幹而色黑也四逆謂四逆湯也當歸四逆謂當歸四逆湯也先者謂先服當歸四逆湯也少滿痛謂少腹滿按之痛也厥謂厥冷也薑萸入謂當歸四逆湯加入吳萊萸生薑也蛔厥謂厥而吐蛔也靜而復時煩謂煩時止時煩也得食而嘔蛔聞臭謂嘔因蛔聞食臭而始嘔也煩因蛔動謂煩因蛔動而始煩也烏梅丸蛔厥謂宜用烏梅丸也詳厥陰篇厥陰陽邪脈證陽邪熱厥厥而熱消渴熱氣撞心疼煩滿囊縮舌焦卷便硬尚任大承攻四逆不分四逆散咳加薑味下利同悸加桂枝腹痛附下重薤白祕尿苓注陽邪謂厥陰邪從陽化之熱證也厥謂手足寒也厥而復熱熱而復厥是為熱厥厥微熱微厥深熱深也消渴謂飲水多而小便少也熱氣上撞心疼是火挾木邪而逆也煩滿謂少腹煩滿也囊縮謂外腎為熱灼筋縮入腹也舌焦卷謂舌苔乾焦而卷也便硬謂大便硬尚可任攻宜大承氣湯四逆謂四肢厥冷也不分謂寒熱之厥疑似不分也宜四逆散疏達厥陰其厥不回再審寒熱可也或咳加生薑五味子下利亦加故曰同也心下悸加桂枝腹痛加附子瀉利下重加薤白祕尿不利加茯苓詳少陰厥陰篇少陰厥陰外熱裡寒脈證少陰裡寒外熱證面赤身反不惡寒厥利清穀脈微絶通脈四逆主之先利止參加脈不出蔥入面色赤炎炎腹痛加芍咽桔梗嘔加聖藥用薑鮮注少陰裡寒外熱之證面赤不惡寒格陽外熱也四肢厥冷下利清穀脈微欲絶陰極裡寒也宜通脈四逆湯主之服四逆湯下利止脈仍不出加人參面色赤者加蔥腹痛加芍藥咽痛加桔梗嘔加生薑詳少陰篇兩感一日太陽少陰病頭痛口乾渴而煩二日陽明太陰病滿不欲食身熱譫三日少陽厥陰病耳聾囊縮厥逆寒水漿不入神昏冒六日氣盡命難全注兩感者臟腑表裡同病也一日頭痛太陽也口乾煩渴少陰也二日身熱譫語陽明也腹滿不欲食太陰也三日耳聾少陽也囊縮而厥厥陰也傳經之邪其為病也漸兩感之邪其為病也速蓋因陽邪酷烈正不能御所以三日後水漿不入六腑之氣欲絶昏不知人五臟之神已敗而不即死者賴有胃氣未盡耳故又三日其氣乃盡而死張潔古制大羌活湯以羌獨芩連輩辛甘以散太陽之表苦寒以清少陰之熱施之於表裡不急者固為得法也若夫一日則頭痛口乾煩渴二日則身熱譫語腹滿不欲食三日則耳聾囊縮而厥水漿不入昏不知人傳變如此迅速恐用大羌活湯平緩之劑反失機宜當遵仲景治有先後之説審其表裡孰急隨證治之猶或可活故於此證初病一日表里俱熱者依少陰病得之二三日口燥咽乾之法用大承氣湯重劑以瀉陽邪之烈表裡俱寒者依少陰病始得之反發熱脈沉之法用麻黃附子細辛湯以解陰邪之急二日表里俱實者依陽明病譫語有潮熱腹滿時減減不足言之法用大承氣湯攻之表裡虛者依三陽合病腹滿身重面垢譫語之法用大劑白虎加人參湯清之三日表裡熱者依厥深熱亦深之法用大承氣湯下之表裡寒者依脈微欲絶手足厥寒之法用當歸四逆加吳茱萸生薑湯溫之緩則不及事矣其間頗有得生者後之學者其留意焉汗下失宜致變壞證太陽三日已發汗若吐若下若溫針不解致逆成壞證觀其脈證犯何經難辨陰陽六經證重困垂危莫可憑惟用獨參煎冷服鼻上津津有汗生注太陽病三日已發汗不解若吐若下著溫針苟或相當即成解證如其不當不但病不解或因而致逆變成壞怔當觀其脈證知犯何經之逆如汗後亡陽渴躁譫語下後寒中結胸痞硬吐後內煩腹滿溫針後黃衄驚狂之類隨證治之可也甚或脈微欲絶神昏不能言循衣摸床叉手冒心等重困垂危難辨陰陽六經莫可憑之怔此時此際惟用人參煎湯徐徐冷服以待其機倘得鼻上津津有汗則為可生之兆也表證表證宜汗太陽經無汗發熱惡寒風頭項強痛身體痛若出自汗表虛明注表證謂寒邪在表無汗發熱惡寒惡風頭項強痛身體痛也太陽經主表故曰表證有是證無汗者皆屬表實雖有是證若自汗出者皆屬表虛未可輕汗即有風邪只宜桂枝湯解肌可也表實無汗重者麻黃湯主之輕者麻桂各半湯主之時有汗時無汗者桂枝二麻黃一湯主之表實躁熱甚者三黃石膏湯主之微者大青龍湯主之不躁有熱者桂枝二越婢一湯主之以上表證不必悉具亦不論日之多寡但見有頭痛惡寒一二證即為表未罷雖有里證當先解表表解已乃可攻之臨證者不可不詳辨也詳太陽篇里證里證宜下不大便惡熱潮熱汗蒸蒸燥干譫語滿硬痛便溏為虛不可攻注里證謂熱邪內結不大便惡熱潮熱自汗蒸蒸口燥舌乾譫語腹滿硬痛也陽明腑主裡故曰里證裡實者有脾約有胃實有大便難三者均為可下之證然不無輕重之別三承氣湯脾約丸量其可者而與之庶乎無過也若便溏為裡虛即有是證不可攻也論中有急下數證不待便實而下之者是下其熱也非下其結也義詳陽明少陰篇陽證陽證身輕氣高熱目睛了了面唇紅熱煩口燥舌乾渴指甲紅兮小便同注陽證謂陽熱之證也不論三陰三陽凡見是證者均為陽熱有餘也陽主動故身輕也陽氣盛故氣高而喘也陽主熱故口鼻氣熱也陽主寤故目睛了了而不眠也目睛不了了亦有熱極朦隴似不了了然必目赤多眵非若陰證之不了了而神短無光也陽氣熱故身熱面唇紅指甲紅也陽熱入里故心煩口燥舌乾而渴小便紅也表實者三黃石膏湯發之裡實者三承氣湯下之表裡不實而熱盛者白虎解毒等湯清之可也詳三陽篇陰證陰證身重息短冷目不了了色不紅無熱欲臥厥吐利小便白兮爪甲青注陰證謂陰寒之證也不論三陰三陽凡見是證者均為陰寒不足也陰主靜故身重也陰主寐故目不了了但欲臥也陽氣虛寒故息短口鼻氣冷也陰淫於外故面無紅色四肢厥冷爪甲青也陰邪入內故嘔吐下利清穀小便清白也以上皆三陰寒證臨證者以附子四逆理中吳茱萸等湯擇其宜而與之可也詳三陰篇陽盛格陰陽盛格陰身肢厥惡熱煩渴大便難沉滑爪赤小便赤汗下清宜陰自完注經曰陽氣太盛陰氣不得相營也不相營者不相入也既不相入則格陰於外故曰陽盛格陰也其外證雖身肢厥冷頗似陰寒而內則煩渴大便難小便赤惡熱不欲近衣爪甲赤脈沉滑一派陽實熱證汗下清三法得宜則陽得以消陰得以完全也表實無汗三黃石膏湯裡實不便三承氣湯熱盛無表裡證宜解毒白虎湯集注劉完素曰蓄熱內甚脈須疾數以其極熱蓄甚而脈道不利反致脈沉細欲絶俗未明造化之理反謂傳為寒極陰毒者或始得之陽熱暴甚而便有此證候者或兩感熱甚者通宜解毒加大承氣湯下之後熱稍退而未愈者黃連解毒湯調之或微熱未除者涼膈散調之或失下熱極以至身冷脈微而昏冒將死若急下之則殘陰暴絶必死蓋陽後竭而然也不下亦死宜涼膈散或黃連解毒湯養陰退陽積熱漸以消散則心胸再暖而脈漸以生也陰盛格陽陰盛格陽色淺赤發熱不渴厥而煩下利尿清爪青白浮微通脈復陽還注經曰陰氣太盛陽氣不得相營也不相營者不相入也既不相入則格陽於外故曰陰盛格陽也色淺赤謂面色見浮淺之紅赤色也其外證面赤發熱而煩頗類陽熱其內則不渴下利清穀小便清白爪甲青白四肢厥冷脈浮微欲絶一派陰寒虛證宜通脈四逆湯冷服之從其陰而復其陽也利止脈不出加倍人參下利無脈宜白通加豬膽汁人尿湯厥煩欲死宜吳茱萸湯陽毒陽毒熱極失汗下舌卷焦黑鼻煤煙昏噤發狂如見鬼咽疼唾血赤云斑六七日前尚可治表裡俱實黑奴丸熱盛解毒裡實下表實三黃石膏煎注陽毒謂陽熱至極之證也失汗下謂應汗不汗應下不下失其汗下之時也熱毒炎炎不已故舌卷焦黑鼻內生煤煙也熱毒內攻乘心故神昏噤栗發狂如見鬼神咽疼唾血也熱毒外薄肌膚故發赤色如錦云之斑也六七日前謂日淺毒未深入故尚可治表裡俱實謂有是證無汗不大便者宜黑奴丸兩解之無表裡實證熱盛者宜黃連解毒湯兼燥渴者合白虎湯清之裡實不便者宜解毒承氣湯下之表實無汗者宜三黃石膏湯發之陰毒陰毒寒極色青黑咽痛通身厥冷寒重強身疼如被杖腹中絞痛若石堅或嘔或利或煩躁或出冷汗溫補先無汗還陽退陰汗急灸氣海及關元注陰毒謂陰寒至極之證也血脈受陰毒邪故面色青黑也陰毒內攻於裡故咽痛腹中絞痛也陰毒外攻於表故厥冷通身重強疼痛如被杖也獨陰無陽不化故陰凝腹若石之堅硬也或嘔吐或下利或煩躁或冷汗出皆陽虛不足或有之證均以溫補為先宜四逆湯倍加人參若有是證其人無汗宜還陽散退陰散溫而汗之使寒毒散而陽伸也凡遇此證俱宜急灸氣海關元二三百壯隨服藥餌未有不生者也
