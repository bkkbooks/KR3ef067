郁在三焦表裡中氣血不宣經絡壅梔翹芩薄草歸芎硝黃芍術膏滑石麻黃桔梗共防荊利減硝黃嘔薑半自汗麻去桂枝增注此方治一切風火之邪鬱於三焦表裡經絡氣血不得宣通初感發熱頭痛膚疹傳經斑黃抽搐煩渴不眠便祕尿澀皆可服之功效甚奇用之自知其妙也柴葛解肌湯四時合病在三陽柴葛解肌柴葛羌白芷桔芩膏芍草利減石膏嘔半薑注此方陶華所制以代葛根湯凡四時太陽陽明少陽合病輕證均宜以此湯增減治之增減者謂如無太陽證者減羌活無少陽證者減柴胡也即柴胡葛根羌活白芷桔梗赤芍石膏黃芩甘草也下利減石膏以避裡虛也嘔加半夏生薑以降里逆也黃連解毒湯梔子金花湯三黃石膏湯陽毒熱極疹斑嘔煩渴呻吟譫語狂下後便軟熱不已連芩梔柏解毒湯裡實便硬當攻下梔子金花加大黃表實膏麻蔥豆豉下利除膏入葛良注陽毒熱極等證或下後便軟壯熱不已宜黃連解毒湯即黃連黃芩黃柏梔子也若裡實便硬當攻下者宜加大黃名梔子金花湯若表實無汗當發汗者宜加石膏麻黃淡豆豉蔥白名三黃石膏湯下利者減石膏加葛根避里不實也消毒犀角飲消毒犀角表疹斑毒壅咽喉腫痛難犀角牛蒡荊防草熱盛加薄翹芩連注消毒犀角飲即消毒飲之防風荊芥牛蒡子甘草加犀角也熱盛加連翹薄荷黃芩黃連也消斑青黛飲消斑青黛消斑毒參虎柴犀梔地元黃連熱實減參去苦酒加入大黃煎注消斑青黛飲即青黛參虎謂人參白虎湯即人參石膏知母甘草柴胡犀角山梔生地元參黃連用苦酒與水煎也熱甚便實者減去人參加大黃可也普濟消毒飲普濟大頭天行病無里邪熱客高巔芩連薄翹柴升桔蠶草陳勃蒡藍元注普濟消毒飲治天行傳染大頭瘟疫無里可下者是其邪熱客於高巔即黃芩黃連薄荷連翹柴胡升麻桔梗殭蠶甘草陳皮馬勃牛蒡子板藍根元參也連翹敗毒散連翹敗毒散發頤高腫焮紅痛可除花粉連翹柴胡蒡荊防升草桔羌獨紅花蘇木芎歸尾腫面還加芷漏蘆腫堅皂刺穿山甲便燥應添大黃疏注連翹敗毒散治時毒發頤高腫焮紅疼痛之陽證也即連翹天花粉柴胡牛蒡子荊芥防風升麻甘草桔梗羌活獨活紅花蘇木川芎歸尾兩頤連面皆腫加白芷漏蘆腫堅不消加皂刺穿山甲大便燥結加酒炒大黃都氣湯橘皮竹茹湯厄逆腎虛都氣湯六味肉桂五味方橘皮竹茹虛熱主橘竹參草棗生薑注都氣湯即六味地黃湯加肉桂五味子也橘皮竹茹湯即橘紅竹茹人參甘草大棗生薑也葳蕤湯風溫浮盛葳蕤湯羌麻葛芷青木香芎草石膏葳蕤杏裡實熱甚入硝黃注風溫初起六脈浮盛表實壯熱汗少者宜葳蕤湯以發表風邪也即羌活麻黃葛根白芷青木香川芎甘草石膏葳蕤杏仁也裡實熱甚多汗者加芒硝大黃以攻裡熱也桂枝白虎湯風溫虛熱汗出多難任葳蕤可奈何須是鼾睡而燥渴方宜桂枝虎參合注風溫初起脈浮有力汗少壯熱宜與葳蕤湯若脈虛身熱汗多難用葳蕤湯者合與桂枝白虎加人參湯如不鼾睡口中和而不燥不渴身熱汗多脈浮盛者乃亡陽之證非風溫也即桂枝白虎加人參湯亦不可用也瀉心導赤各半湯越經無證如醉熱脈和導赤各半湯芩連梔子神參麥知滑犀草棗燈薑注越經病名也無證謂無表裡證也無表裡證脈和而身熱不解形如醉人者是越經證也宜瀉心導赤各半湯治之即黃連黃芩梔子茯神人參麥冬知母滑石犀角甘草燈心生薑大棗也大羌活湯兩感傷寒病二經大羌活湯草川芎二防二術二活細生地芩連知母同注兩感傷寒病名也二經謂一曰太陽少陰二曰陽明太陰三曰少陽厥陰同病也張潔古制大羌活湯治之即甘草川芎防風防己蒼朮白朮羌活獨活細辛生地黃芩黃連知母也詳在傷寒要訣還陽散退陰散黑奴丸陰毒還陽硫黃末退陰炮烏乾薑均陽毒黑奴小麥疸芩麻硝黃釜灶塵注還陽散即石硫黃末每服二錢新汲水調下良久寒熱汗不出再服之汗出愈退陰散即炮變色川烏微炒乾薑等分為末每服一錢鹽湯滾數沸服四肢不溫連服三次即溫熱服若吐冷服亦可黑奴丸即小麥成黑疽者名曰小麥奴黃芩麻黃芒硝大黃釜底煤灶突煙梁上塵也為末蜜丸重四錢新汲水下服後若渴欲飲冷水者令恣意飲之須臾自當寒振汗出腹響微利而解也若不渴者恐是陰極似陽服之反為害耳九味羌活湯九味羌活即沖和四時不正氣為疴潔古制此代麻桂羌防蒼細芷芎合生地草芩喘加杏無汗加麻有桂多胸滿去地加枳桔煩渴知膏熱自瘥注此湯即沖和湯張潔古制此以代麻黃桂枝二湯即羌活防風蒼朮細辛白芷川芎生地甘草黃芩也喘加杏仁無汗加麻黃有汗加桂枝胸膈滿悶去生地加枳殼桔梗快膈氣也煩渴引飲加知母石膏熱自瘥也十神湯十神外感寒氣病功在溫經利氣殊升葛芎麻甘草芍薑蔥香附芷陳蘇注此湯即升麻葛根川芎麻黃甘草芍藥香附白芷陳皮蘇葉生薑蔥白也能外發寒邪內舒鬱氣故曰寒氣病較之他劑有溫經利氣之功殊也人參敗毒散荊防敗毒散倉廩散人參敗毒虛感冒發散時毒疹痢良參苓積桔芎草共柴前薄荷與獨羌時毒減參加翹蒡血風時疹入荊防表熱噤痢加倉米溫熱芩連實硝黃注人參敗毒散治氣虛感冒時氣之病即枳殼桔梗川芎茯苓人參甘草柴胡前胡薄荷獨活羌活也時毒謂受四時不正之氣或腫兩腮兩頤或咽喉腫痛依本方減人參加牛蒡連翹治之時疹謂初病即有之疹血風謂遍身瘙癢之疹俱依本方減人參加荊芥防風治之名荊防敗毒散表熱無汗噤口痢疾依本方加倉米治之名倉廩散溫病熱病熱甚俱加黃連黃芩胃實便硬俱加芒硝大黃也五積散內傷生冷外感寒五積平胃半苓攢麻桂積桔歸芎芍薑芷加附逐陰寒腹痛嘔逆吳萸入有汗除麻桂枝添虛加參朮除積桔婦人經痛艾醋煎注五積散即芩朮陳皮厚朴甘草半夏茯苓麻黃官桂枳殼桔梗當歸川芎白芍乾薑白芷也表重用桂枝里重用官桂陰寒肢冷加附子腹痛嘔逆加吳茱萸有汗除去麻黃加桂枝氣虛加人參白朮除去枳桔婦人經痛加艾葉醋煎服之升麻葛根湯升葛芍草表陽明下利斑疹兩收功麻黃太陽無汗入柴芩同病少陽經注升麻葛根白芍甘草即升麻葛根湯也陽明表邪不解或數下利及斑疹不透者均宜主之若兼太陽無汗之表證入麻黃若兼少陽口苦耳聾寒熱往來半表裡之證加柴胡黃芩也二聖救苦丹初起時疫溫熱病救苦汗吐下俱全熱實百發而百中大黃皂角水為丸注此丹即大黃四兩皂角二兩為末水為丸也每服三錢無根水下弱者老者幼者量減服之此藥施治於初起時疫傳染傷寒溫病熱病熱盛形氣俱實者百發百中服後或汗或吐或下三法俱全其病立解溫膽湯傷寒病後液津干虛煩嘔渴不成眠乃是竹葉石膏證膽經飲熱此方先口苦嘔涎煩驚悸半苓橘草枳竹煎氣虛加參渴去半再加麥粉熱芩連注傷寒病後燥渴虛煩乃竹葉石膏湯證非溫膽湯證詳在傷寒要訣若少陽膽經飲熱則口苦嘔煩驚悸是溫膽湯證也即半夏茯芩橘皮甘草枳實竹茹也形氣俱虛或因汗吐下後及氣虛者均加人參渴去半夏加麥冬花粉以生津也有熱加黃芩黃連以清熱也
