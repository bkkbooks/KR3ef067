body:
  text: 卷三類傷寒五證停痰傷食腳氣虛煩內癰相類傷寒有五證頭疼發熱惡風寒停痰頭項不強痛胸滿難息氣衝咽傷食惡食身無痛痞悶矢氣噫作酸腳氣腳漆脛腫痛或為乾枯大便難虛煩微熱無表裡內癰能食審疼緣肺癰喘咳胸引痛唾黏腥臭吐膿涎胃癰當胃痛難近腸癰腫痛少腹堅身皮甲錯腹中急便數似淋證中看注類傷寒五證初病之時皆與太陽表證相類一曰停痰但胸滿不得息氣上衝咽頭項不強痛與傷寒異耳一曰傷食但身無痛心下痞悶矢氣噫氣作酸吞酸與傷寒異耳一曰腳氣但病起自腳腳膝兩脛腫痛或乾枯腫痛名曰乾腳氣大便硬難與傷寒異耳一曰虛煩惟發熱而煩無表裡證與傷寒異耳一曰內癰其狀頗類傷寒但飲食如故有癰痛之處與傷寒異耳胸中隱痛或喘或咳吐唾腥黏是肺癰也當胃作痛手不可近是胃癰也少腹重痛便數似淋身皮甲錯是腸癰也同傷寒十二證冬溫寒疫瘟疫春溫夏熱秋清涼冬氣冷冽令之常傷之四時皆正病非時有氣疫為殃應冷反溫冬溫病應溫反冷寒疫傷瘟疫長幼相傳染須識歲氣汗攻良注冬病傷寒春病傷風夏病暑病秋病瘧疾皆四時正令之常病也若春應暖而反寒夏應熱而反涼秋應涼而反熱冬應寒而反溫此非其時而有其氣疫為殃也冬應冷反溫而病傷寒者名曰冬溫春應溫反寒而病傷寒者名曰寒疫若一時之氣不正長幼皆病互相傳染名曰瘟疫凡治此病須識歲氣太過不及六淫勝復人之強弱臟之寒熱量其輕重或汗或攻輕以劉完素之雙解散重以李杲之二聖救苦丸隨證施治可也溫病熱病冬傷於寒春病溫夏日熱病早虧陰脈浮頭疼發熱渴不惡寒兮是所因無汗河間兩解法有汗清下早當尋失治昏狂諸熱至無證隨經以意神注經曰冬傷於寒春必病溫至夏為熱病熱病者皆傷寒之類也冬傷於寒謂冬傷正令微寒未即病也早虧陰謂冬不藏精之人或辛苦之人汗出內外失其固密在冬則早已損傷腎藏陰氣陽熱獨治所以至春一感微邪即引內熱炎炎之勢不能已矣故病而即渴不惡寒也初病無汗有表證者從劉完素兩解湯治法可也有汗內熱盛者或清或攻急瀉其陽而救其陰若因循失治昏狂諸熱證至則緩不及事也無證謂表裡無證當隨六經以意消息治之自可通神也風溫風溫原自感春風誤汗灼熱汗津生陰陽俱浮難出語身重多眠息鼾鳴誤下直視失溲少被火發黃瘛瘲驚葳蕤桂枝參白虎一逆引日再命終注冬傷於寒不即病者復感春寒名曰溫病復感春風名曰風溫風溫有汗不可汗也若誤汗之益助火邪則身熱如火自汗津津不止言語難出身重多眠鼻息鼾鳴也風溫陰陽脈俱浮不可下也若誤下之熱陷膀胱竭其津液則直視失溲小便少也風濕熱盛若誤以火熏蒸強汗火旺津亡則發黃色瘛瘲驚癇也風溫之證不可汗下主以葳蕤湯若脈虛汗多主以桂枝合人參白虎湯一逆引日再命終謂一逆尚可引日若汗而又下下而又火則為再逆是促命期也溫瘧溫瘧得之冬中風寒氣藏於骨髓中至春邪氣不能發遇暑爍髓消肌形或因用力腠發泄邪汗同出故熱生衰則氣復寒後作證同溫熱治相同注經曰溫瘧得之冬中於風寒氣藏於骨髓之中至春陽氣尚微邪氣不能自出因值大暑爍腦髓消肌肉腠理發泄或有所用力邪氣與汗同出出則陰虛而陽盛故熱生也衰則氣復入入則陽虛而陰盛故後作寒也其證同溫熱治亦相同也濕溫溫復傷濕濕溫病身重胸滿及頭疼妄言多汗兩脛冷白虎湯加蒼朮苓注溫病復傷於濕名曰濕溫其證則身重胸滿頭疼妄言多汗兩脛逆冷宜白虎湯加蒼朮茯苓溫濕兩治法也中暍溫毒風濕溫病中暍溫毒病證同溫熱熱尤炎傷濕汗出當風立風濕發熱重疼牽注中暍即中暑也溫熱之病復中於暑名曰溫毒證治同乎溫熱但熱尤盛也傷濕之病復感於風名曰風濕其證發熱身重疼痛牽掣也治法已詳於身痛矣中暍詳在暑門痙證痙證反張搖頭噤項強拘急轉側難身熱足寒面目赤須審剛柔治法全注風濕寒之邪合而為痙其證則背反張搖頭口噤項強拘急轉側艱難身熱足寒面目赤色也須審剛柔治之可痊也風濕盛者則有汗為柔痙風寒盛者則無汗為剛痙均以小續命湯主之剛痙去附子柔痙去麻黃表實者去參附加羌活獨活裡實者去參附加芒硝大黃甚者則以葛根湯桂枝加葛根湯發之此治痙之大略也詳在痙門易愈生證神清色澤亮音聲身輕膚潤脈和洪忽然口噤難言躁脈即停伏戰汗寧飲多消散知釀汗能食脈浮表還平子得午解陽來濟午得子解是陰從注易愈之病取於神則神清取於色則色澤取於聲則音長取於體則身輕取於皮則膚潤取於脈則和洪皆一派不死之證故曰生證也若有如是之生證忽然口噤不語煩躁而甚六脈停伏宜謹察之非變凶也乃邪正交爭生戰汗之候為將愈之兆也凡傷寒渴者多陽證易愈若忽然飲多尋常消散無停知釀汗而作解也傷寒多不能食若忽然能食且脈浮知胃和邪還於表而作解也若不即解者陰陽未得其時也子時得之午時必解陽濟陰生而解也午時得之子時必解陰從陽化而解也難治死證傷寒死證陽見陰大熱不止脈失神陰毒陽毒六七日色枯聲敗死多聞心絶煙燻陽獨留神昏直視及搖頭環口黧黑腹滿利柔汗陰黃脾敗由肺絶脈浮而無胃汗出如油喘不休唇吻反青肢冷汗舌卷囊縮是肝憂面黑齒長且枯垢溲便遺失腎可愁水漿不入脈代散厄逆不已命難留大發風溫而成痙濕溫重暍促命終強發少陰動經血口鼻目出厥竭名汗後狂言不食熱脈躁陰陽交死形厥冷不及七八日膚冷而躁暫難寧此病名之曰臟厥厥而無脈暴出凶厥而下利當不食反能食者名除中注病有生死治有難易生病不藥可愈死病雖藥莫救何則以陰陽邪正有盛衰也正盛邪衰則生陰盛陽衰則死傷寒陽證見浮大數動滑之陽脈則易愈而生見沉微澀弱弦之陰脈則難治而死故陰病見陽脈者生陽病見陰脈者死也大熱不止邪盛脈失神正虛正虛邪盛故死也陰毒陽毒亢極不生化也色枯聲敗內外兩奪也故均主死形若煙燻神昏直視搖頭者此陽邪獨留攻心而絶也環口黧黑腹滿下利不止柔汗陽黃者此為脾絶也脈但浮無胃汗出如油喘息不休者此為肺絶也唇吻反青四肢冷汗舌卷囊縮此為肝絶也面黑齒長枯垢溲便遺失者此為腎絶也水漿不入生無所賴也脈代散真氣衰散也厄逆無休元氣不藏也誤發風溫之汗因而成痙誤發濕溫之汗名曰重暍皆促人命也強發少陰汗動其經血從口鼻目出名曰下厥上竭以上皆死之候也汗後狂言不食仍復發熱不為汗衰脈躁疾者名曰陰陽交死之形也厥逆不回至七八日即通身膚冷而躁無暫寧時者名為臟厥為陰邪盛極真陽飛越也凡厥逆而甚者多無脈服四逆白通等湯脈微續者真陽漸復也脈暴出者回光反照也凡厥逆多下利當不能食今反能食名曰除中中者胃也除者去也謂胃氣已去即反能食亦無補於胃也故仲景曰除中者死凡諸病久不能食忽然大能食而即死者亦此類也匯方桂枝湯小建中湯當歸建中湯黃耆建中湯桂枝加葛根湯桂枝新加湯當歸四逆湯當歸四逆加吳茱萸生薑湯桂枝加附子湯芍藥甘草湯桂枝甘草湯桂枝芍藥草薑棗加飴歸耆曰建中加葛根湯加乾葛新加倍芍加參稱當歸四逆歸通細更加吳萸薑用生加附子湯加附子去桂去芍兩名興注桂枝湯桂枝芍藥甘草生薑大棗也依本方倍芍藥加飴糖名小建中湯更加當歸名當歸建中湯更加黃耆名黃耆建中湯依本方加葛根名桂枝加葛根湯依本方倍芍藥加人參名桂枝新加湯依本方加當歸通草細辛名當歸四逆湯更加吳茱萸生薑名當歸四逆加吳茱萸生薑湯依本方加附子名桂枝加附子湯依本方去桂枝名芍藥甘草湯依本方去芍藥名桂枝甘草湯桂枝去芍藥加茯苓白朮湯苓桂朮甘湯茯苓甘草湯茯苓稜枝甘草大棗湯桂枝去芍加苓朮苓桂術甘去棗薑茯苓甘草生薑桂加棗除薑大棗湯注桂枝去芍藥加茯苓白朮湯即桂枝甘草生薑大棗茯苓白朮也依本方減去大棗生薑即苓桂朮甘湯也茯苓甘草湯即茯苓甘草桂枝生薑也依本方加大棗減生薑即茯苓桂枝甘草大棗湯也葛根湯桂枝麻黃各半湯桂枝二麻黃一湯桂枝二越婢一湯葛根桂枝加麻葛合麻桂麻各半湯桂二麻一麻減半桂二越一桂倍方注葛根湯即桂枝湯加麻黃葛根也桂枝麻黃各半湯即桂枝湯麻黃湯二方合劑也桂枝二麻黃一湯即桂枝湯合減一半麻黃湯也桂枝二越婢一湯即越婢湯合加一倍桂枝湯也麻黃湯大青龍湯越婢湯越婢加附子湯越婢加半夏湯麻黃麻桂甘草杏加膏薑棗大青龍越婢大青減桂杏加附加半風水清注麻黃湯麻黃桂枝甘草杏仁也依本方加石膏生薑大棗名大青龍湯依大青龍湯減桂枝杏仁名越婢湯治風水病之肌熱者若陽虛惡寒加附子名越婢加附子湯喘咳上氣加半夏名越婢加半夏湯當分別而施治也麻黃加朮湯三拗湯麻杏石甘湯麻黃加朮風濕痛三拗去桂喘寒風加膏麻杏石甘劑外寒內熱喘收功注麻黃加朮湯即麻黃湯加白朮也治風濕在表身痛麻黃湯去桂枝名三拗湯治風寒表實而喘三拗湯加石膏名麻杏石甘湯治內熱表寒無汗而喘麻黃附子細辛湯麻黃附子甘草湯麻黃附子細辛湯減辛加草甘草方兩感太陽少陰證能發表水裡寒涼注麻黃附子細辛湯即此三味也去細辛加甘草名麻黃附子甘草湯不但能發兩感太陽少陰表熱裡寒之證且能發太陽少陰表水裡寒之腫也小青龍湯附子湯真武湯桂芍乾薑辛半味麻黃甘草小青龍附子朮附參苓芍真武無參有薑生注小青龍湯桂枝白芍乾薑細辛半夏五味子麻黃甘草也附子湯白朮附子人參茯苓白芍也真武湯即附子湯除去人參加生薑也乾薑附子湯白通湯白通加人尿豬膽汁湯四逆湯通脈四逆湯茯苓四逆湯理中湯桂枝人參湯附子理中湯治中湯薑附加蔥白通劑更加尿膽治格陽加草四逆蔥通脈加參茯苓四逆方理中參朮乾薑草加桂桂枝人參湯加附名曰附子理加入青陳治中湯注乾薑附子名曰乾薑附子湯依本方加蔥名曰白通湯更加人尿豬膽汁名白通加人尿豬膽汁湯依本方加甘草名四逆湯更加蔥自名通脈四逆湯依四逆湯方加人參茯苓名茯苓四逆湯溫中利水人參白朮乾薑甘草名理中湯依理中湯方加桂枝名桂枝人參湯依理中湯方加附子名附子理中湯依理中湯方加青皮陳皮名治中湯溫中理氣五苓散春澤湯五苓甘露飲蒼附五苓散茵陳五苓散胃苓湯五苓停水尿不利內蓄膀胱外太陽二苓澤術桂分用虛渴加參春澤湯甘露寒水膏滑入蒼附內寒附子蒼茵陳發黃小便澀食瀉合胃胃苓方注五苓散即茯苓豬苓澤瀉白朮桂枝也治水停小便不利少腹滿則為內蓄膀胱若不兼太陽頭痛惡寒發熱自汗之表則不用桂枝而用肉桂故曰桂分用也治諸虛飲渴加人參名春澤湯治水停內熱加寒水石滑石石膏名五苓甘露飲治水停內寒加附子蒼朮名蒼附五苓散治內瘀濕熱小便不利發黃加茵陳名茵陳五苓散治停水傷食泄瀉合平胃散名胃苓湯梔子豉湯梔子甘草豉湯梔子生薑豉湯枳實梔子豉湯枳實梔子豉加大黃湯梔子乾薑湯梔子厚朴湯梔豉加草加生薑枳實梔豉加大黃去豉梔子乾薑入枳朴梔子厚朴湯注梔子淡豆豉名梔子豉湯加甘草名梔子甘草豉湯加生薑名梔子生薑豉湯加枳實名枳實梔子豉湯依枳實梔子豉方加大黃名枳實梔子豉加大黃湯去豉加乾薑