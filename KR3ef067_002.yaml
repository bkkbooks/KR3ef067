body:
  text: 卷二表熱裡熱陰熱陽熱發熱無時熱翕翕炊籠騰越熱蒸蒸表熱尿白裡熱赤外需麻桂內涼承燥干煩渴為陽熱厥利外熱屬陰經陽熱宜清白虎輩陰熱四逆與白通注發熱無時熱翕翕謂發熱無休止之時若合羽外覆之表熱也炊籠騰越熱蒸蒸謂發熱如炊籠蒸蒸內越之裡熱也表熱熱不在裡故尿白也裡熱故尿赤也外需麻桂謂表熱無汗宜麻黃湯有汗宜桂枝湯內涼承謂裡熱輕者宜涼膈散重者宜三承氣湯發熱兼口燥舌乾煩渴者為陽經之熱也發熱兼厥冷下利清穀者屬陰經之熱也陽熱宜清白虎解毒輩也陰熱宜溫四逆白通湯也注翕翕蒸蒸發熱俱有汗二證相類若以翕翕之表熱誤為蒸蒸之裡熱下之則逆若以蒸蒸裡熱誤為翕翕表熱汗之轉傷翕翕之汗熱雖同蒸蒸捫之自溫不似蒸蒸之汗熱捫之自有熱氣透手也其間或有疑似難辨又當審小便之白赤舌苔之潤燥自可決也惡寒背惡寒辨惡寒表裡陰陽辨發熱有汗表為虛發熱無汗表實證實以麻黃虛桂枝無熱惡寒發陰里桂枝加附頗相宜背寒口和陰附子口燥渴陽白虎需注惡寒一證有表裡陰陽之辨發熱惡寒發於陽表也有汗宜桂枝湯無汗宜麻黃湯無熱惡寒發於陰里也有汗宜桂枝加附子湯無汗宜麻黃附子細辛湯背惡寒口和謂口中不燥而和也陰謂屬少陰也宜附子湯背惡寒口燥渴謂口中燥而渴也陽謂屬陽明也宜白虎加人參湯注陰陽二經惡寒雖同其身有熱無熱則異也一則汗之二則溫之少陰陽明之背惡寒雖同其口中和口中不和則異也一則溫之一則清之惡寒雖屬輕微之證仲景立法可辨他可類推矣惡風風寒相因相離少三陽俱有惡寒風惡風屬陽法從表三陰惡寒無惡風注風寒二者大率多相因而少相離有寒時不皆無風有風時不皆無寒故三陽俱有惡寒惡風同見也惡風與惡寒均表病也法當從表然風屬陽寒屬陰故三陰經證有惡寒而無惡風也頭痛三陽頭痛身皆熱無熱吐沫厥陰經不便尿紅當議下尿白猶屬表未清注三陽謂太陽陽明少陽也頭痛身皆熱謂三陽頭痛身皆熱也三陽經頭痛法當從三陽治也厥陰頭痛則多厥而無熱嘔吐涎沫是厥陰挾寒邪上逆也宜吳茱萸湯溫而降之三陽頭痛若不大便小便紅赤為裡實熱法當議下宜承氣湯若小便清白即不大便為裡熱未實表尚未清法當先從表治也三陰經無頭痛惟厥陰有頭痛以其脈與督脈上會於巔也三陰經無發熱厥陰少陰亦有發熱謂之反發熱以其藏有相火陰盛格陽於外也項強項背几几強太陽脈浮無汗葛根湯有汗桂枝添葛入脈沉栝蔞桂枝方結胸項強如柔痙大陷胸丸下必康但見少陽休汗下柴胡去半入蔞良注項強太陽病也項背強太陽陽明病也幾兒拘強而甚之貌也脈浮屬二陽之表脈也若無汗是從傷寒傳來宜葛根湯有汗是從中風傳來宜桂枝加葛根湯脈沉謂邪已入胸裡也宜栝萎桂枝湯結胸謂結胸病也項強如柔痙謂項強背反張有汗如柔痙之狀也宜大陷胸丸但見少陽謂太陽少陽並病之項強休汗下謂邪入少陽不可更汗下也宜柴胡湯去半夏加栝萎主之良好也栝蔞桂枝湯方在金匱要略身痛身痛未汗表實證汗後身疼屬表虛桂加生薑參芍藥尺遲血少建中耆少陰沉厥附子治厥陰汗利四逆醫風濕盡痛難轉側掣引煩疼桂附宜注身痛未汗屬表實證宜麻黃湯汗後身疼屬表虛證宜桂枝新加湯即桂枝湯倍生薑芍藥加人參也曰桂加即桂枝湯加此也尺遲血少建中耆謂身痛尺中脈遲是血少營氣不足也雖未經汗不可發汗宜建中湯加黃耆以補營血也少陰謂身痛見少陰沉脈四肢厥冷也附子治謂宜附子湯治也厥陰謂身痛見厥陰厥逆汗出不止下利清穀也四逆醫謂以四逆湯醫也風濕謂風濕身痛也盡痛難轉側是濕則令人一身盡痛不能轉側掣引煩疼是風則令人筋脈牽引煩疼不寧也桂附宜謂宜以桂枝附子湯也煩躁不眠懊憹躁身不靜煩心擾不躁難眠作熱觀懊憹煩甚無冷病惟躁陰陽表裡看諸煩無論三法後便軟梔竹等湯煎便硬白虎三承氣躁同陰見便屬寒注身為熱動而不安謂之躁心為熱擾而不寧謂之煩煩則擾於內躁則動於外故有心煩而無身煩有身躁而無心躁也大抵煩屬陽躁屬陰若懊憹心中反復顛倒煩不得眠不與躁同見者皆無冷病當作熱觀也惟躁則不然當分表裡陰陽取治故太陽有不汗出而煩躁謂之在表大青龍證也陽明有心下硬之煩躁謂之在陽白虎湯證也三陰有吐利手足厥之煩躁謂之在陰四逆輩證也諸煩謂煩不眠懊憹也無論三法後謂不論已經未經汗吐下三法之前後也但大便不硬者以竹葉石膏溫膽梔子豉等湯主治可也便硬者量其熱之深淺以白虎三承氣湯主治可也躁同陰見謂躁同三陰證見便屬陰寒之躁宜四逆理中吳茱萸湯主治可也自汗頭汗自汗熱越多急下更兼熱利不休凶頭汗熱蒸不得越黃濕水火血皆成注自汗在太陽謂之風邪桂枝湯證也在陽明謂之熱越白虎湯證也若大熱蒸蒸汗出過多則宜調胃承氣湯急下其熱救其津也若更兼發熱下利不休內外兩脫故凶也頭汗出劑頸而還則為熱不得外越上蒸於首也或因黃郁未發或因濕家誤下或因水結胸蒸或因火劫熱迫或因陽明蓄血或因熱入血室皆令成之則當分門施治可也手足汗手足濈濈然汗出便硬尿利本當攻寒中汗冷尿不利攻之固瘕瀉澄清注胃主四肢為津液之主今熱聚於胃蒸其津液傍達於四肢故手足濈濈然汗出且小便自利胃中津液必干大便必硬本當攻也若中寒胃陽土虛脾不約束津液橫溢四肢猶如陰盛淫雨滂沱故汗出而冷也陽虛失運中寒不化故小便不利也今雖便硬而手足汗出非為熱越者比慎不可攻攻之必變生固瘕泄瀉澄清不止也潮熱時熱午後一發為潮熱無休發熱汗蒸蒸時熱自汗無里證先時與藥桂枝稱注潮熱陽明腑證也陽明旺於申酉故潮熱發於午後如潮信之不失因名之曰潮熱可下之證也無休發熱汗蒸蒸謂發熱無休止之時熱氣透手溱漆有汗名曰蒸蒸發熱亦屬陽明內實可下之證也時熱自汗者謂發熱時輕時重而有自汗也似潮熱而次數似蒸蒸而休止潮熱蒸蒸之熱則必兼有可下之證時熱時止之熱則必不兼可下之證故曰無里證也因其無里證熱而有汗知風邪留連在表不已故用桂枝主治然必先其發熱汗出之時與桂枝湯也蓋桂枝不為時熱自汗者設而為時熱自汗有表無里證者設也此處重在無里證非謂凡有時熱自汗皆可服桂枝湯也譫語鄭聲譫語為實聲長壯亂言無次數更端鄭聲為虛音短細頻言重復更呢喃同陽經見均屬熱同陰經見總為寒陽無可攻當清解陰不能溫清補痊注言語心主之也心氣實熱而神有餘則發為譫語譫語為實故聲長而壯亂言無次數數更端也心氣虛熱而神不足則發為鄭聲鄭聲為虛故音短而細只將一言重復呢喃也蓋神有餘則能機變而亂言神不足則無機變而只守一聲也凡譫語鄭聲與陽經同見者均屬熱證可以攻之與陰經同見者總為寒證可以溫之若雖與陽經同見而無可攻之證不可攻之當清解也與陰經同見而無可溫之證不可溫之當清補也渴證三法傷津胃燥干陽往乘陰渴亦然渴欲飲水少少與莫使停留飲病干太陽五苓尿不利陽明白虎飲連連少陽證具心煩渴小柴去半粉加添注渴病多因或汗或吐或下三法傷其津液致令胃中乾燥故引飲也陽邪往乘三陰太陰則嗌乾少陰則口燥厥陰則消渴渴在三陰陽邪亦屬熱傷津液故曰渴亦然也三陰之渴治法詳於三陰經內凡渴欲飲水者當少少與之以滋胃干胃和則愈若恣意與飲之不但渴不能愈致水停留為病也太陽之渴用五苓散者以水停下焦小便不利故也陽明之渴用白虎者以胃熱飲水連連不已也少陽寒熱往來等證已具心煩渴者用小柴胡湯以和解去半夏以避燥加花粉以生津液也舌苔舌心外候本澤紅紅深赤色熱為輕外紅內紫為熱重滑白寒表少陽經沉遲細緊臟寒結干薄氣液兩虛空黃黑苔潤裡熱淺焦乾刺裂熱深明黑滑若與三陰見水來剋火百無生注舌者心之外候色應紅澤為無病也若初感內外紅深則為有熱外紅內紫則為熱甚舌苔滑白則為表寒其苔漸厚則為傳少陽經也熱者宜辛涼汗之寒者宜辛溫汗之在少陽者為胸中有寒丹田有熱也小柴胡湯兩解之胸中指表也淺也丹田指里也深也非直指胸中丹田謂半里之熱未成半表之寒猶在故舌白一證有寒有熱也若其苔滑厚與陰證脈同見乃臟虛寒結以理中加枳實溫而開之若其苔干薄與陽證同見乃氣虛液竭以白虎加人參清而補之若白苔漸變黃色此為去表入里其熱尚淺表不罷者宜三黃石膏湯已入里者涼膈散如焦乾黑色或芒刺裂紋此為裡熱已深宜梔子金花湯兼滿痛者大承氣湯紅火色也黑水色也與三陽證見為熱極反兼勝已之化清之下之尚可治也若與三陰證見則為水來剋火百無一生治者以生薑擦之其黑色稍退急用附子理中四逆輩救之可生胸脅滿痛邪氣傳裡必先胸由胸及脅少陽經太陽脈浮惟胸滿過經不解有陽明乾嘔潮熱胸脅滿大柴加硝兩解行心腹引脅硬滿痛乾嘔尿祕十棗攻注邪氣傳裡必先自胸若脈浮惟胸滿而不及脅者仍屬太陽表分也宜麻黃湯因胸及脅而皆滿者屬少陽經也宜小柴胡湯若十餘日不解而胸脅滿兼乾嘔潮熱者是少陽兼有陽明也宜大柴胡湯加芒硝兩解之若表已解心下及腹引脅滿硬而痛乾嘔小便不利者是停飲內實也宜十棗湯攻之嘔吐嘔病因何屬少陽表入里拒故為殃太陽之嘔表不解食谷欲嘔在胃陽太陰有吐而無嘔厥陰涎沫吐蛔長少陰嘔利有水氣飲嘔相因是水鄉注嘔病諸經皆有因何屬少陽也因表邪入里裡氣拒格上逆作嘔故為殃屬少陽也宜小柴胡湯心下硬而煩或不大便宜大柴胡湯表不解之嘔屬太陽也宜柴桂湯食谷欲嘔屬胃陽胃陽陽明也屬中寒宜吳茱萸湯得湯更嘔屬表熱宜葛根加半夏湯嘔吐涎沫或嘔吐蛔屬厥陰也宜吳茱萸湯吐蛔者宜烏梅丸嘔而下利是有水氣屬少陰也宜真武湯飲而嘔嘔而飲飲嘔相因不已是停水也宜五苓散往來寒熱如瘧寒熱往來寒熱少陽證寒熱相因小柴胡如瘧寒熱三五發太陽麻桂等湯除注寒而熱熱而寒寒熱相因不已故名曰往來寒熱為少陽主證宜小柴胡湯寒熱而有作止之常一日一次或隔日一次謂之瘧屬雜病也寒熱而無作止之常日三五發謂之如瘧屬太陽經未盡之表邪也宜麻桂各半湯若熱多寒少宜桂枝二越婢一湯若有汗宜桂枝二麻黃一湯若無汗亦宜麻桂各半湯此皆治太陽未盡之微邪法也目眩耳聾少陽目眩神自正諸逆昏亂不能生重蠍耳聾濕溫汗不語面色變身青注目眩者目黑不明也耳聾者耳無所聞也皆少陽經主證非死候也其目之明其耳之聰神自完整若因三法失宜致諸變逆壞證目眩而神昏言亂乃神散氣脫之候故曰不能生也若因誤發濕溫家汗而不能言語耳聾無聞身青面色變者名曰重暍亦死證也腹滿痛腹滿時痛不足證腹滿大痛有餘名誤下邪陷太陰里汗熱便硬轉陽明注腹滿時痛為不足桂枝加芍藥湯不愈用理中湯腹滿大痛為有餘桂枝加大黃湯此皆誤下邪陷太陰之裡證也若潮熱自汗大便硬則為太陰之邪轉屬陽明也宜大承氣湯吐證中寒吐食不能食不渴而厥吐寒虛得食吐渴火為逆飲吐相因水病居注中寒吐食謂中寒吐食不能食也凡不渴而厥吐是寒虛吐也宜理中吳茱萸輩凡渴而得食即吐是火吐也熱實宜黃連解毒湯熱虛宜乾薑黃連黃芩湯或竹葉石膏湯渴而飲飲而吐吐而復渴水逆病也宜五苓散熱利寒利熱利尿紅渴黏穢寒利澄清小便白理中不應宜固澀仍然不應利之瘥注自利不渴者屬太陰寒也下利欲飲水者以有熱故也此以渴辨寒熱也小便黃赤穢氣稠黏者皆熱利也小便清白澄徹清穀皆寒利也熱利有表證輕者升麻葛根湯重者葛根湯汗之有里證者量以三承氣湯下之無表裡證輕者宜黃芩湯重者宜葛根黃連黃芩湯清之寒利宜理中湯溫而補之若服理中湯不應者此屬下焦滑脫宜赤石脂禹餘糧湯固澀仍然不應此為清濁不分水走大腸宜五苓散或豬苓湯利之可瘥也但欲寐行陰嗜臥無表裡呼醒復睡不須驚風溫脈浮熱汗出多眠身重息鼾鳴注行陰欲寐嗜臥少陰證也若欲寐嗜臥無表裡證身和脈小知已解也然解後之睡呼之則醒醒而又睡是陰氣來復非陰盛困陽不須驚也風溫亦欲寐多眠則有脈浮發熱汗出身重鼻息鼾鳴之別也陰陽咽痛咽痛干腫為陽熱不幹不腫屬陰寒陽用甘桔等湯治陰用甘桔附薑攢注咽痛一證寒熱皆有咽乾腫痛為三陽熱證宜甘桔半夏苦酒豬膚等湯調治不幹不腫而痛為三陰寒證宜四逆湯加桔梗主治也氣上衝氣撞吐蛔厥陰本無蛔陽表桂枝湯少腹急引燒褌散沖喉難息瓜蒂良注氣撞吐蛔謂厥陰本證也無蛔謂氣撞不吐蛔乃邪猶在陽表也宜桂枝湯少腹急引謂氣上衝更少腹引陰急痛乃陰陽易病也宜燒褌散沖喉難息謂氣上衝喉胸滿難以布息乃寒實在胸也宜瓜蒂散飢不欲食飢不欲食吐蛔厥下後不食屬陽明懊憹頭汗梔子豉厥緊心煩邪在胸注飢不欲食吐蛔厥謂厥陰本證也下後飢不能食屬陽明也陽明病則懊憹心中煩甚頭上汗出是熱在胃中宜梔子豉湯湧之厥陰病則吐蛔厥逆脈微今不微而緊更心煩者非寒虛邪是寒實邪而在胸中宜瓜蒂散吐之手足厥逆太陰手足溫無厥少陰厥冷不能溫厥陰寒厥分微甚熱厥相因辨淺深注太陰經無厥逆而有手足自溫少陰經有寒厥而無熱厥厥陰經有寒熱二厥寒厥者只寒而不熱也熱厥者由熱而厥由厥而熱熱厥相因無休歇也當辨陰陽淺深以當歸四逆承氣等湯施治可也詳厥陰篇少腹滿痛少腹滿而按之痛厥逆尿白冷膀胱不厥血蓄小便利小便不利水為殃注少腹滿按之痛若四肢厥冷小便清白者是冷結膀胱宜當歸四逆加吳茱萸生薑湯不厥冷小便自利者是血蓄膀胱宜桃仁承氣湯小便不利者是水蓄膀胱宜五苓散若大小便不利者是水熱蓄結宜八正散神昏狂亂蓄血發狂神昏胃熱重陽狂三黃三承白解湯蓄血發狂小便利少腹硬痛屬太陽陽明蓄血大便黑其人如狂而喜忘桃仁承氣抵當治須識作汗奄然狂注神昏胃熱謂神昏是胃經熱極乘心也重陽狂謂熱入於陽則狂亂也三黃謂三黃石膏湯治神昏狂亂表實無汗者也三承謂三承氣湯治神昏狂亂裡實不便者也白解湯謂白虎解毒湯治神昏狂亂無表裡證而熱極者也太陽蓄血發狂則少腹硬痛小便自利若小便不利是水熱蓄也非血蓄也陽明血蓄如狂則喜忘大便黑若大便不黑是熱極也非血蓄也蓄血輕者桃仁承氣湯重者抵當湯擇而用之可也然發狂證亦有陽盛陰虛之人作汗將解之時奄然發狂濈然汗出而解者當須識之不可以藥也循衣摸床循衣摸床有二因太陽火劫熱傷陰小便利生不利死陽明熱極熱彌深皆緣三法失成壞脈實堪下弱難禁虛實陰陽難辨處獨參六味可回春注循衣摸床危惡之證也一因太陽火劫取汗致陽盛傷陰陰若末竭則小便利多生陰若已竭則小便難多死一因陽明熱極汗吐下三法失宜致成壞證其熱彌深脈實者堪下則可治脈弱者不堪下則難治此已成危惡壞證往往陰陽虛實醫莫能辨無下手處當以大劑獨參六味乾生地黃湯時時與之每獲生也太陽陽邪停飲太陽陽邪有水逆消渴發熱汗出煩小便不利水入吐脈浮而數五苓攢注太陽陽邪有水逆消渴之病謂太陽中風有渴欲飲水水入即吐者名曰水逆飲水多而小便少者名曰消渴發熱汗出風邪出煩熱也小便不利水入則吐飲停也浮數風熱脈也均宜五苓散多服暖水令微汗出外解太陽內利停水則愈若不能飲暖水欲飲冷水者是熱盛也以五苓散加寒水石石膏滑石可也詳太陽上篇太陽陰邪停飲太陽陰邪有水氣傷寒無汗熱烘烘主證乾嘔咳微喘外發內散小青龍小便不利少腹滿下利除麻共入苓噎麻易附喘加杏渴加花粉減半平注太陽陰邪有水氣謂太陽傷寒表不解發熱無汗兼有乾嘔而咳微喘飲病之主證宜以小青龍湯外發寒邪內散寒飲則可愈也或小便不利少腹滿或下利或噎或喘或渴此飲病或有之證亦以小青龍湯主之小便不利少腹滿是水停下焦大便下利是水走大腸俱除麻黃共入茯苓專滲利也噎為內寒之甚以麻黃易附子散內寒也喘氣上逆加杏仁以降逆也渴加花粉減去半夏以避燥生津也詳太陽下篇少陰陽邪停飲少陰陽邪有停飲六七日反不得眠下利而渴咳而嘔小便不利豬苓煎注少陰陽邪有停飲謂少陰陽邪熱證兼有停飲病也少陰病當欲寐至六七日反心煩不得眠是少陰熱也下利而渴咳嘔小便不利是水飲停也以豬苓湯去其熱而利其水可也詳少陰篇少陰陰邪停飲少陰陰邪有水氣腹痛四肢重沉疼小便不利自下利或咳或嘔真武平咳加乾薑辛味共小便若利去茯苓嘔去附子生薑倍利去芍藥入干寧注少陰陰邪有水氣謂少陰陰寒兼有水氣病也飲病主證謂腹痛四肢沉重疼痛大便自利小便不利宜真武湯溫中利水也飲病或有之證或咳或小便利或嘔或下利咳加生薑細辛五味子小便若利去茯苓嘔去附子倍加生薑利去芍藥入乾薑也喘急短氣喘息喝喝數張口短氣似喘不抬肩促難布息為實證短不續息作虛觀內因飲病或痰熱外因陰陽表裡看直視神昏汗潤髮脈微肢厥命難全注喘息氣急喝喝而數張口抬肩欠肚者喘也短氣則似喘非喘而不張口抬肩也二證皆胸中氣病肺主氣故屬肺也無論喘急短氣若氣促壅塞不能布息為有餘之實證若氣短空乏不能續息為不足之虛證內因謂飲冷傷肺或因痰熱也外因謂形寒傷表表主皮毛肺之合也皮毛受邪其次及膚及肌及胸及腹入胃皆令病喘當審陰陽表裡從化主治可也喘急短氣兼直視神昏汗出潤髮脈微四肢厥冷皆死候也與三陰寒證同見是為陰喘宜四逆加杏仁五味子虛者倍加人參與三陽熱證同見是為陽喘宜白虎葛根黃芩黃連湯與太陽表證同見是為表喘無汗者麻黃湯兼煩躁者大青龍湯有汗者桂枝加厚朴杏子湯與陽明裡證同見是為里喘宜大承氣湯兼結胸者宜大陷胸丸若兼水氣表實者小青龍湯表虛者及小便不利均宜五苓散加葶藶子裡實者宜葶藶大棗湯兼腹脅硬痛者宜十棗湯裡寒者宜真武湯若脈微細口鼻氣短喘乏而無陰陽表裡證此氣虛喘也宜保元湯加五味子杏仁若喘而唾痰稠黏喉間漉漉有聲此痰喘也重者宜瓜蒂散礞石滾痰丸輕者二陳加苦葶藶子蘇子之類也心下悸築築惕惕心動悸怔怔仲仲不自安飲多尿少為停水厥冷汗後是虛寒注心下築築惕惕怔怔忡忡謂悸病之狀也飲水多而小便少水停心下之悸也宜茯苓甘草湯或五苓散厥冷為寒宜真武湯汗後為虛宜小建中湯或不因汗後是虛之甚也宜炙甘草湯戰振栗戰身聳動栗心𢙿振雖聳動比戰輕故振責虛因無力栗戰相交邪正爭此證若生三法後虛其中外逆而成不逆因和而作解正勝邪卻戰汗平注戰謂身抖聳動也栗謂心內發𢙿也振亦聳動比之於戰則無力也所以論中曰振振者皆責其虛也栗邪氣為之也戰正氣為之也邪正相交故爭也此證若生於汗吐下之後是虛其中外而致逆也若不致逆邪因以衰正因以和而作解則為正勝邪卻戰栗汗出而平也呢逆噦噫厄逆今名䭇古名不似噦噦胃裡聲䭇聲格格連聲作原夫臍下氣來沖頗類暖噫情自異均屬氣逆治能同虛熱橘皮竹茹治二便不利利之寧氣不歸原宜都氣寒虛丁萸附理中痞硬下利生薑瀉痞硬噫氣代赭功注今之名曰厄逆即古之名曰䭇也䭇者氣噎結有聲也世有以噦為厄逆者蓋不知噦噦之聲聲從胃裡出口不似䭇之格格連聲氣從臍下來自衝脈出口作聲也厄逆頗類噯氣噫氣噯氣者因飽食太急比時作噯轉食氣也噫氣者因過食傷食越時作噫食臭氣也故曰情自異也但均屬氣逆為病故曰治能同也厄逆之病胃氣虛竭也兼熱者以橘皮竹茹湯加柿蒂主之兼大便不利以三承氣湯主之兼小便不利以二苓散湯主之兼腎虛不能攝衝脈之氣歸原以都氣湯加牛膝主之兼寒虛太陰手足溫以丁萸理中湯主之少陰手足厥更加附子兼痞硬下利以生薑瀉心湯主之兼痞硬噫氣以旋覆代赭石湯主之結胸按之滿硬不痛痞硬而滿痛為結胸大結從心至少腹小結心下按方疼熱微頭汗為水結漱水不咽血結名瘀衄未盡經適斷內實沉大審的攻抵當桃仁大小陷誤攻浮大命多傾不實浮滑小陷證臟結悉具躁煩凶注傷寒下之太早則成痞硬中風下之太早則成結胸均為表邪乘虛入里硬滿按之而痛為結胸實邪也硬滿按之不痛為痞硬虛邪也大結謂大結胸從心下至少腹硬滿而痛手不可近者宜大陷胸湯攻之小結謂小結胸微結心下按之方痛不按不疼也宜小陷胸湯開之身有微熱頭自汗出兼有是證者為水結胸也宜大陷胸丸攻之漱水不欲咽兼有是證者為血結胸也血瘀不成衄解或衄末盡或婦人經來適斷皆能成之宜抵當丸或桃仁承氣湯攻之內實證實可攻也沉大脈實可攻也審其的當則用抵當桃仁承氣大陷胸湯丸以攻之審若不內實脈浮滑或脈浮大是未的也乃小陷胸證不可攻也誤攻之定然凶也臟結謂狀如結胸舌苔白滑脈浮而細也悉具謂結胸通腹兩脅皆硬滿痛也此證加之煩躁凶死可知痞硬陽證痞硬為熱痞大黃黃連瀉心寧汗出惡寒寒熱痞附子瀉心兩收功誤下少陽發熱嘔痞滿半夏瀉心能虛熱水氣痞下利心煩乾嘔腹雷鳴虛熱水氣生薑瀉痞急氣逆甘草靈桂枝表解乃攻痞五苓煩渴利尿通注傷寒下早則成痞硬中風下早則成結胸此其常也然論中中風下早未嘗無痞硬傷寒下早亦有結胸大抵從虛化者多為痞硬從實化者多結胸也陽證心下痞硬為熱痞宜大黃黃連瀉心湯若陽證汗出惡寒為寒熱痞宜附子瀉心湯誤下少陽發熱而嘔心下痞滿為嘔逆痞宜半夏瀉心湯陽證誤下心下痞硬下利心煩乾嘔腹中雷鳴脅下有水氣致小便不利為虛熱水氣之痞宜生薑瀉心湯若有是證脅下無水氣其痞急益甚為虛熱客氣上逆之痞宜甘草瀉心湯凡有痞者有無汗惡寒之表宜桂枝湯表解已乃可以大黃黃連瀉心湯攻痞也若有痞者與瀉心湯痞不解其人煩渴小便不利先以五苓散小便利後乃可與諸瀉心湯治痞也發黃濕熱發黃頭汗出小便不利渴陽明素有寒濕發汗後黃從陰化太陰經陽色鮮明陰色暗太陽血蓄並狂生表實麻翹赤小豆茵陳裡實梔子清陰黃茵陳四逆主便溏尿祕茵五苓環口黛黑柔汗死體若煙燻陽絶徵注陽明病應遍身有汗謂之熱越今頭汗出身無汗是熱不得越也渴而引飲小便不利是停水也熱與濕瘀從土而化外薄肌肉謂之濕熱發黃也或其人素有寒濕為表邪遏郁或已成黃又經發汗傳入太陰從陰而化謂之濕寒發黃也陽明屬陽故其色明亮太陰屬陰故其色晦暗也太陽蓄血亦有發黃多與狂病並生法當從蓄血治也表實無汗發黃者宜麻黃連翹赤小豆湯汗之裡實不便者宜茵陳蒿湯下之無表裡證熱盛者宜梔子柏皮湯清之陰證發黃者宜茵陳四逆湯溫之若大便溏小便祕發黃者宜茵陳五苓散利之環口黧黑柔汗者陰黃死證也柔汗謂冷汗也身體枯燥如煙燻者陽黃死證也疹斑傷寒疹斑失汗下感而即出時氣然表邪覆郁營衛分外泛皮脈痧疹斑痧白疹紅如膚粟斑紅如豆片連連紅輕赤重黑多死淡紅稀暗是陰寒未透升麻消毒治熱盛三黃石膏煎已透青黛消斑飲雙解痧疹法同前注傷寒發斑疹痧皆因汗下失宜外邪覆郁內熱泛出而成也惟時氣傳染感而即出亦由疫之為病烈而速也發於衛分則為痧衛主氣故色白如膚粟也發於營分則為疹斑營主血故色紅膚淺為疹深重為斑斑形如豆甚則成片連屬斑疹之色紅者輕赤者重黑者死此以熱之深淺驗死生也若其色淡紅而稀暗者皆因邪在三陽已成斑疹入里邪從陰化或過服冷藥所致是為陰斑陰痧陰疹法當從陰寒主治也斑出未透表熱輕者宜升麻葛根湯合消毒犀角飲治之表熱重者宜三黃石膏湯發之已透用青黛消斑飲加減清之痧疹初起表裡不清用雙解散先通表裡余法同前治之可也衄血陽明衄血熱在裡太陽衄血熱瘀經太陽頭痛目瞑兆陽明漱水不咽徵衄後身涼知作解不解升麻犀角清未衄表實麻黃汗裡熱犀角芩連同注陽明衄血熱在裡也太陽衄血熱瘀經也太陽失汗則有頭痛目瞑之兆陽明失下則有漱水不欲咽之徵衄血之後身涼脈靜知作解也若仍不解知衄未盡熱留於營也無汗表熱宜升麻葛根合犀角地黃湯清解之欲作衄未衄者表實宜麻黃湯汗之裡熱宜犀角地黃湯加芩連清之若表實裡熱者則又當合二方兩解之吐血傷寒吐血多因逆下厥上竭少陰經三陽熱盛宜清解血瘀胸滿痛當攻暴吐腐臭內潰死過多血脫面無紅犀角桃仁宜揀用救脫聖愈及養榮注傷寒吐血皆因失汗失下火逆以致邪熱熾盛沸騰經血故也若血從口鼻耳目而出小便難此為強發少陰汗名曰下厥上竭為難治也三陽熱盛吐血宜升麻葛根合犀角地黃湯熱甚加芩連清解可也若血瘀則胸滿或痛當以桃仁承氣合犀角地黃湯攻之若暴吐腐臭之血名曰內潰內潰者死若吐血過多面唇無紅色名曰血脫救脫輕者以聖愈湯重者以人參養榮湯大小便膿血熱在膀胱小便血八正導赤利之佳熱瘀裡急下膿血黃連白頭與桃花注陽經之熱下注膀胱傷其營分熱少血多瘀成血蓄熱多血少熱迫血行血不得蓄而走下竅故尿血也以八正散導赤散利而清之陰經之熱轉迫陽明傷其營分瘀則血蓄喜忘如狂不蓄則便血熱腐則便膿便膿熱鬱裡急下重所必然也輕者宜黃連阿膠腸重者白頭翁湯清之滑脫者桃花湯澀之可也頤毒傷寒發頤耳下腫失於汗下此毒生高腫焮紅痛為順反此神昏命必傾毒伏未發脈亦隱冷汗淋漓肢若冰煩渴不便指甲紫頗似三陰了了輕注傷寒頤毒皆因汗下失宜毒熱挾少陽相火上攻而成也若其人陽氣素盛則高腫焮紅疼痛易於成膿故為順也宜連翹敗毒散散之或其人陽氣素虛或服冷藥過多遏郁毒熱伏藏在裡內攻神昏外毒漫腫肉色不變不疼木硬則命必危也毒伏未發之前往往似三陰亡陽之證脈隱不見冷汗淋漓肢冷若冰但身輕目睛了了煩渴不大便指甲紅紫為異此毒發始臨治不可忽也狐惑古名狐惑近名疳狐蝕肛陰惑唇咽病後餘毒斑疹後癖疾利後也同然面眥赤白黑不一目不能閉喜貪眠潮熱聲啞腐穢氣能食堪藥治多全注狐惑牙疳下疳等瘡之古名也近時惟以疳呼之下疳即狐也蝕爛肛陰牙疳即惑也蝕咽腐齦脫牙穿腮破唇毒因傷寒病後餘毒與濕𧈟之為害也或生斑疹之後或生癖疾下利之後其為患亦同也其證則面色目眥或赤或白或黑時時不一喜睡目不能閉潮熱聲啞腐爛之處穢氣燻人若胃壯能食堪受攻病重藥或病之勢緩治多全也百合百合百脈合一病如寒似熱藥無靈飲食起居皆忽忽如神若鬼附其形脈數尿時輒頭痛尿時不痛淅淅風尿時快然但頭眩六四二十病方寧注百合病者謂傷寒過期留連不解不分經絡百脈悉合為一病也如寒似熱諸藥無靈欲飲不能飲欲食不能食欲臥不能臥欲行不能行精神忽忽如神若鬼附其形體而莫知所適從也如脈數尿尿時輒頭痛者六十日乃愈若尿尿時頭不痛惟淅淅然惡風寒者四十日乃愈若尿時快然但頭眩者二十日乃愈故曰六四二十日病方寧也熱入血室婦人傷寒同一治胎産經來熱入室晝日明瞭夜譫妄小柴生地牡丹皮無汗加麻有汗桂汗後不解再加枝寒熱如瘧加麻桂中寒薑附不須疑渴熱白虎花粉葛瘀血桃仁承氣俱産後胎前雖多證不外陰陽表裡醫注婦人傷寒與男子治法同也惟産後經來邪熱乘虛而入血室另有治法熱入血室之證晝日明瞭夜則譫語妄見鬼狀宜小柴胡湯加生地丹皮若無汗則為表實加麻黃汗之有汗則為表虛加桂枝解之若有發熱惡寒之表已經發汗雖無汗不加麻黃再加桂枝以解之不可復用麻黃也若有如瘧之寒熱加麻黃桂枝兩解之若厥而下利則為中寒去黃芩加薑附不須疑也若發熱煩渴則為裡熱去半夏合白虎或加花粉葛根胸脅少腹或滿硬或作痛則為瘀血宜合桃仁承氣湯攻之産後胎前雖有多證不能盡述總不外陰陽表裡之治在臨證者以意消息之耳食復勞復新愈臟腑皆不足營衛腸胃未通和多食過勞復生熱枳實梔子大黃瘥浮汗沉下小柴解燥嘔竹葉石膏合氣虛補中益氣主陰虧六味倍參多注新愈之後臟腑氣血皆不足營衛未通腸胃未和惟宜白粥靜養若過食胃弱難消因復煩熱名曰食復若過勞役復生熱煩名曰勞復勞復者宜枳實梔子豉湯汗之食復者宜枳實梔子豉加大黃湯下之脈浮有表者宜枳實梔子豉湯以汗解之脈沉有里者宜枳實梔子豉加大黃湯以下解之若無表裡證者宜小柴胡湯以和解之口燥煩渴喜嘔者宜竹葉石膏湯主之若內傷氣虛勞復者宜補中益氣湯主之若犯內事陰虧者宜六味生乾地黃湯氣少者倍加人參湯主之房勞復陰陽易房勞復與陰陽易二病情異證則同病後犯色復自病病傳不病易之名男女俱主燒褌散少腹急痛引陰中身重少氣頭眩暈拘攣熱氣上衝胸注男女新愈交接因而復病名曰房勞復男女新愈交接病男傳不病之女病女傳不病之男名曰陰陽易即交易之義也犯是病者男以女之褌襠女以男之褌襠燒灰白湯或酒日三服之則愈少腹急痛牽引陰中身重少氣頭目眩暈四肢拘攣熱氣衝胸是其證也
